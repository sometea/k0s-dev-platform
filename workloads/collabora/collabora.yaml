apiVersion: v1
kind: Namespace
metadata:
  name: collabora
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
      - name: collabora
        image: collabora/code:latest
        ports:
        - containerPort: 9980
          name: http
        env:
        - name: aliasgroup1
          value: https://nextcloud.beamtime.net:443
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: collabora
spec:
  selector:
    app: collabora
  ports:
  - port: 80
    targetPort: 9980
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collabora
  namespace: collabora
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - http:
        paths:
        - path: /collabora(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: collabora
              port:
                number: 80
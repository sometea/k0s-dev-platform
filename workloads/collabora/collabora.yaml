apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
      - name: collabora
        image: collabora/code:latest
        ports:
        - containerPort: 9980
          name: http
        env:
        - name: aliasgroup1
          value: "https://nextcloud.beamtime.net:443"
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: default
spec:
  selector:
    app: collabora
  ports:
  - port: 9980
    targetPort: 9980
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collabora
  namespace: default
spec:
  rules:
  - host: collabora.example.com
    http:
      paths:
      - path: /collabora(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: collabora
            port:
              number: 9980